[book]
authors = ["Faiz N Sait"]
language = "en"
multilingual = false
src = "."
title = "Java & Spring Boot Interview Notes"
description = "Comprehensive interview preparation notes for Java, Spring Boot, microservices, and system design."

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = ""
site-url = "/"
no-section-label = true

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 25
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 2
